# Coordinate convention: [col, row] where col+ = right, row+ = up.
# Board row 0 = bottom
num_cols: 10
num_rows: 25 # 5 buffer rows above visible area
num_visible_rows: 20
num_rots: 4
num_previews: 5
# J, L, S, Z, T: 3 by 3 bounding box
# I: 4 by 4 bounding box
# O: 2 by 2 bounding box (no kick)
pieces:
  J:
    coords:
      "0": [[0, 1], [1, 1], [2, 1], [0, 2]]
      R: [[1, 0], [1, 1], [1, 2], [2, 2]]
      "2": [[2, 0], [0, 1], [1, 1], [2, 1]]
      L: [[0, 0], [1, 0], [1, 1], [1, 2]]
    kicks: &jlszt_kicks
      cw:
        "0": [[0, 0], [-1, 0], [-1, -1], [0, 2], [-1, 2]] # L->0
        R: [[0, 0], [-1, 0], [-1, 1], [0, -2], [-1, -2]] # 0->R
        "2": [[0, 0], [1, 0], [1, -1], [0, 2], [1, 2]] # R->2
        L: [[0, 0], [1, 0], [1, 1], [0, -2], [1, -2]] # 2->L
      ccw:
        "0": [[0, 0], [1, 0], [1, -1], [0, 2], [1, 2]] # R->0
        R: [[0, 0], [-1, 0], [-1, 1], [0, -2], [-1, -2]] # 2->R
        "2": [[0, 0], [-1, 0], [-1, -1], [0, 2], [-1, 2]] # L->2
        L: [[0, 0], [1, 0], [1, 1], [0, -2], [1, -2]] # 0->L
    origin: [3, 18]
    width: 3
  L:
    coords:
      "0": [[0, 1], [1, 1], [2, 1], [2, 2]]
      R: [[1, 0], [2, 0], [1, 1], [1, 2]]
      "2": [[0, 0], [0, 1], [1, 1], [2, 1]]
      L: [[1, 0], [1, 1], [0, 2], [1, 2]]
    kicks: *jlszt_kicks
    origin: [3, 18]
    width: 3
  S:
    coords:
      "0": [[0, 1], [1, 1], [1, 2], [2, 2]]
      R: [[2, 0], [1, 1], [2, 1], [1, 2]]
      "2": [[0, 0], [1, 0], [1, 1], [2, 1]]
      L: [[1, 0], [0, 1], [1, 1], [0, 2]]
    kicks: *jlszt_kicks
    origin: [3, 18]
    width: 3
  Z:
    coords:
      "0": [[1, 1], [2, 1], [0, 2], [1, 2]]
      R: [[1, 0], [1, 1], [2, 1], [2, 2]]
      "2": [[1, 0], [2, 0], [0, 1], [1, 1]]
      L: [[0, 0], [0, 1], [1, 1], [1, 2]]
    kicks: *jlszt_kicks
    origin: [3, 18]
    width: 3
  T:
    coords:
      "0": [[0, 1], [1, 1], [2, 1], [1, 2]]
      R: [[1, 0], [1, 1], [2, 1], [1, 2]]
      "2": [[1, 0], [0, 1], [1, 1], [2, 1]]
      L: [[1, 0], [0, 1], [1, 1], [1, 2]]
    kicks: *jlszt_kicks
    origin: [3, 18]
    width: 3
  I:
    coords:
      "0": [[0, 2], [1, 2], [2, 2], [3, 2]]
      R: [[2, 0], [2, 1], [2, 2], [2, 3]]
      "2": [[0, 1], [1, 1], [2, 1], [3, 1]]
      L: [[1, 0], [1, 1], [1, 2], [1, 3]]
    kicks:
      cw:
        "0": [[0, 0], [1, 0], [-2, 0], [1, -2], [-2, 1]] # L->0
        R: [[0, 0], [-2, 0], [1, 0], [-2, -1], [1, 2]] # 0->R
        "2": [[0, 0], [-1, 0], [2, 0], [-1, 2], [2, -1]] # R->2
        L: [[0, 0], [2, 0], [-1, 0], [2, 1], [-1, -2]] # 2->L
      ccw:
        "0": [[0, 0], [2, 0], [-1, 0], [2, 1], [-1, -2]] # R->0
        R: [[0, 0], [1, 0], [-2, 0], [1, -2], [-2, 1]] # 2->R
        "2": [[0, 0], [-2, 0], [1, 0], [-2, -1], [1, 2]] # L->2
        L: [[0, 0], [-1, 0], [2, 0], [-1, 2], [2, -1]] # 0->L
    origin: [3, 17]
    width: 4
  O:
    coords:
      "0": [[1, 1], [2, 1], [1, 2], [2, 2]]
      R: [[1, 1], [2, 1], [1, 2], [2, 2]]
      "2": [[1, 1], [2, 1], [1, 2], [2, 2]]
      L: [[1, 1], [2, 1], [1, 2], [2, 2]]
    kicks: {} # O does not kick
    origin: [3, 18]
    width: 4
